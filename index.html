function openChest(chestRarity){
  const chest=CHESTS[chestRarity];
  if(!chest) return null;
  const total=chest.loot.reduce((s,l)=>s+l.weight,0);
  let roll=Math.random()*total;
  for(const loot of chest.loot){
    roll-=loot.weight;
    if(roll<=0){
      if(loot.type==="seed"){
        // Pick random plant of that rarity
        const pool=CATALOG.filter(x=>x.r===loot.rarity);
        if(!pool.length) return {type:"money",amount:500};
        const plant=pool[Math.floor(Math.random()*pool.length)];
        return {type:"seed",plant,rarity:loot.rarity};
      }
      if(loot.type==="boost") return {type:"boost",hours:12};
      return {type:"money",amount:loot.amount};
    }
  }
  return {type:"money",amount:100};

function checkSpecialEvent(g){
  const now=new Date();
  const dayKey=now.toDateString();
  if(g.specialEventDate===dayKey) return g; // already checked today
  g.specialEventDate=dayKey;
  g.specialEventDone=false;
  g.specialEventPhoto=null;
  // ~20% chance each day
  if(Math.random()<0.20){
    const idx=Math.floor(Math.abs(hashStr(dayKey+(g.id||"x")))%SPECIAL_EVENTS.length);
    g.specialEvent=SPECIAL_EVENTS[idx];
  } else {
    g.specialEvent=null;
  }
  return g;
}

function getTodayEvents(g){
  const now=new Date();
  const dayKey=now.toDateString();
  const weekKey="W"+Math.floor(now.getTime()/(7*864e5));
  const monthKey=now.getFullYear()+"-"+now.getMonth();
  if(!g.dailyEventDate||g.dailyEventDate!==dayKey){
    g.dailyEvent=EVENTS.daily[Math.floor(Math.abs(hashStr(dayKey+g.id||"x"))%EVENTS.daily.length)];
    g.dailyEventDate=dayKey;
    g.dailyEventDone=false;
  }
  if(!g.weeklyEventDate||g.weeklyEventDate!==weekKey){
    g.weeklyEvent=EVENTS.weekly[Math.floor(Math.abs(hashStr(weekKey+g.id||"x"))%EVENTS.weekly.length)];
    g.weeklyEventDate=weekKey;
    g.weeklyEventDone=false;
  }
  if(!g.monthlyEventDate||g.monthlyEventDate!==monthKey){
    g.monthlyEvent=EVENTS.monthly[Math.floor(Math.abs(hashStr(monthKey+g.id||"x"))%EVENTS.monthly.length)];
    g.monthlyEventDate=monthKey;
    g.monthlyEventDone=false;
  }
  return g;
}

function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return h;}

async function sbGetSafe(table) {

async function dbFetch() {
  if (_dbCache) return _dbCache;
  // Test connection first
  const testR = await fetch(`${SB_URL}/rest/v1/nj_users?select=id&limit=1`, { headers: SB_HDR });

      <b>Headers envoyés:</b><br/>apikey: ${SB_KEY.slice(0,20)}...<br/>
    </div>`;
    return null;
  }
  try {
    const [users, gardens, requests, ginvites] = await Promise.all([
      sbGetSafe("nj_users"), sbGetSafe("nj_gardens"), sbGetSafe("nj_requests"), sbGetSafe("nj_ginvites")
    ]);
    _dbCache = {
      users: Object.fromEntries((users||[]).map(u=>[u.id, u.data])),
      gardens: Object.fromEntries((gardens||[]).map(g=>[g.id, g.data])),
      requests: (requests||[]).map(r=>r.data),

    };
  } catch(e) {
    console.error("dbFetch error:", e);
    _dbCache = { users:{}, gardens:{}, requests:[], ginvites:[] };
  }
  return _dbCache;
}

async function dbSave() {
  if (!_dbCache) return;
  // Sync to Supabase — upsert each changed record
  try {
    const uPromises = [];
    for (const [id, data] of Object.entries(_dbCache.users||{})) {
      uPromises.push(sbUpsert("nj_users", {id, data}));
    }
    for (const [id, data] of Object.entries(_dbCache.gardens||{})) {
      uPromises.push(sbUpsert("nj_gardens", {id, data}));
    }
    // requests and ginvites: full replace
    for (const data of (_dbCache.requests||[])) {
      uPromises.push(sbUpsert("nj_requests", {id: data.id, data}));
    }
    for (const data of (_dbCache.ginvites||[])) {
      uPromises.push(sbUpsert("nj_ginvites", {id: data.id, data}));
    }
    await Promise.all(uPromises);
  } catch(e) {
    localStorage.setItem("nj_users", JSON.stringify(_dbCache.users||{}));
    localStorage.setItem("nj_gardens", JSON.stringify(_dbCache.gardens||{}));
  }
}

function makeShopItems(dateStr){
  let h=0; for(let i=0;i<dateStr.length;i++) h=((h<<5)-h)+dateStr.charCodeAt(i)|0;
  const rng=()=>{h=((h<<5)-h)+1|0;return(h&0x7fffffff)/0x7fffffff;};
  const pool=[...CATALOG];
  const byR=(r)=>pool.filter(p=>p.r===r);
  const pick=(arr,n)=>[...arr].sort(()=>rng()-.5).slice(0,n);
  const items=[
    ...pick(byR("common"),2+Math.floor(rng()*2)),
    ...pick(byR("uncommon"),1+Math.floor(rng()*2)),
    ...(rng()<.7?pick(byR("rare"),1):[]),
    ...(rng()<.3?pick(byR("epic"),1):[]),
    ...(rng()<.08?pick(byR("legendary"),1):[]),
  ];
  return items.slice(0,8).map(p=>({...p,qty:1+Math.floor(rng()*3)}));
}

function growthOf(plot, g){
  if(!plot.plant||!g) return 0;
  const p=CATALOG.find(x=>x.id===plot.plant);if(!p)return 0;
  const d=(Date.now()-new Date(plot.plantedAt).getTime())/864e5;
  const w=WEATHER.find(x=>x.id===g.wx);
  const mult=(p.wx===g.wx||p.wx==="any")?(w?.mult||1)*1.25:(w?.mult||1)*0.75;
  return Math.min(1,d*mult/p.days);
}

async function requestNotifications(){
  try {

    let perm=Notification.permission;
    if(perm==="default"){
      perm=await Notification.requestPermission();
    }
    APP.notifPermission = perm==="granted";
    if(APP.notifPermission){
      // Register push via SW
      if(navigator.serviceWorker){
        const reg=await navigator.serviceWorker.ready;
        // Test notification
        reg.showNotification("Notre Jardin 🌸",{body:"Notifications activées !",icon:"/icon-192.png"});
      } else {
        new Notification("Notre Jardin 🌸",{body:"Notifications activées !"});
      }
      showToast("Notifications activées !");
      scheduleReminder();
    } else if(perm==="denied"){
      showToast("Bloquées — active-les dans les paramètres du navigateur");
    } else {
      showToast("Permission refusée");
    }
  } catch(e){
    showToast("Erreur: "+e.message);
  }
  render();
}

function scheduleReminder(){
  if(!APP.notifPermission) return;

  const now = new Date();
  const tomorrow = new Date(now);
  tomorrow.setDate(tomorrow.getDate()+1);
  tomorrow.setHours(20,0,0,0);
  const delay = tomorrow.getTime() - now.getTime();
  setTimeout(()=>{
    sendNotif("Notre Jardin 🌿", "N'oubliez pas d'arroser votre jardin ce soir !");
    scheduleReminder();
  }, Math.min(delay, 2147483647));
}

function sendNotif(title, body, actions){
  if(!APP.notifPermission) return;
  try {
    if(actions && navigator.serviceWorker?.controller) {
      navigator.serviceWorker.ready.then(reg => {
        reg.showNotification(title, {body, icon:"/icon-192.png", badge:"/icon-192.png", actions, requireInteraction:true, tag:"approval"});
      });
    } else {
      new Notification(title, {body, icon:"/icon-192.png"});
    }
  } catch(e) { console.log("notif err",e); }
}

  return`<svg width="${s}" height="${s}" viewBox="0 0 18 16" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="4" width="16" height="11" rx="2" fill="#2a5a8a"/><rect x="1" y="4" width="16" height="11" rx="2" stroke="#4a8acc" stroke-width="1" fill="none"/><rect x="6" y="2" width="6" height="3" rx="1" fill="#3a6a9a"/><circle cx="9" cy="10" r="3.5" fill="#1a4a6a" stroke="#4a8acc" stroke-width="1"/><circle cx="9" cy="10" r="2" fill="#88ccff" opacity=".6"/><circle cx="10" cy="9" r=".8" fill="white" opacity=".7"/><rect x="13" y="6" width="2" height="2" rx=".5" fill="#FFD700" opacity=".8"/></svg>`;
}

function svgFlower(p,size,g){
  g=Math.min(1,Math.max(0.02,g||0.02));
  const s=size,c=p.px||"#FFE066",c2=lightenColor(c,40),cdark=darkenColor(c,30);
  const cx=Math.floor(s/2),cy=Math.floor(s/2);
  const stemH=Math.floor(s*g*0.72),stemY=s-stemH;
  let out=`<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block">`;
  // Soil hint
  if(g<=.08){
    out+=`<rect x="${cx-6}" y="${s-6}" width="12" height="6" rx="3" fill="#6B4226"/>`;
    out+=`<ellipse cx="${cx}" cy="${s-3}" rx="5" ry="3" fill="#8B6014" opacity=".7"/>`;
    out+=`</svg>`;return out;
  }
  // Stem with pixel segments
  const sw=Math.max(2,Math.floor(s*.06));
  out+=`<rect x="${cx-Math.floor(sw/2)}" y="${stemY}" width="${sw}" height="${stemH}" fill="#2d6e24" rx="1"/>`;
  // Stem highlight
  out+=`<rect x="${cx-Math.floor(sw/2)}" y="${stemY}" width="1" height="${Math.floor(stemH*.8)}" fill="#4a9940" opacity=".7"/>`;
  // Leaves
  if(g>.25){
    const leafY=stemY+Math.floor(stemH*.45);
    out+=`<ellipse cx="${cx-Math.floor(s*.18)}" cy="${leafY}" rx="${Math.floor(s*.14)}" ry="${Math.floor(s*.07)}" fill="#3a8a30" transform="rotate(-30,${cx-Math.floor(s*.18)},${leafY})"/>`;
    out+=`<ellipse cx="${cx-Math.floor(s*.18)}" cy="${leafY}" rx="${Math.floor(s*.06)}" ry="${Math.floor(s*.03)}" fill="#5ab040" transform="rotate(-30,${cx-Math.floor(s*.18)},${leafY})"/>`;
  }
  if(g>.45){
    const leafY2=stemY+Math.floor(stemH*.25);
    out+=`<ellipse cx="${cx+Math.floor(s*.18)}" cy="${leafY2}" rx="${Math.floor(s*.14)}" ry="${Math.floor(s*.07)}" fill="#3a8a30" transform="rotate(30,${cx+Math.floor(s*.18)},${leafY2})"/>`;
    out+=`<ellipse cx="${cx+Math.floor(s*.18)}" cy="${leafY2}" rx="${Math.floor(s*.06)}" ry="${Math.floor(s*.03)}" fill="#5ab040" transform="rotate(30,${cx+Math.floor(s*.18)},${leafY2})"/>`;
  }
  // Bud or full flower
  if(g>.65){
    const fc=cx, fy=stemY+3;
    const pr=Math.floor(s*.14); // petal radius
    const angles=[0,51,103,154,206,257,309];
    // Petals back layer (shadow)
    angles.forEach(a=>{
      const px2=fc+Math.cos(a*Math.PI/180)*(pr+2),py2=fy+Math.sin(a*Math.PI/180)*(pr+2);
      out+=`<ellipse cx="${px2}" cy="${py2}" rx="${Math.floor(pr*.8)}" ry="${Math.floor(pr*.5)}" fill="${cdark}" opacity=".5" transform="rotate(${a},${px2},${py2})"/>`;
    });
    // Petals main
    angles.forEach(a=>{
      const px2=fc+Math.cos(a*Math.PI/180)*pr,py2=fy+Math.sin(a*Math.PI/180)*pr;
      out+=`<ellipse cx="${px2}" cy="${py2}" rx="${Math.floor(pr*.85)}" ry="${Math.floor(pr*.52)}" fill="${c}" opacity=".95" transform="rotate(${a},${px2},${py2})"/>`;
    });
    // Petal highlights
    angles.forEach(a=>{
      const px2=fc+Math.cos(a*Math.PI/180)*(pr*.6),py2=fy+Math.sin(a*Math.PI/180)*(pr*.6);
      out+=`<ellipse cx="${px2}" cy="${py2}" rx="${Math.floor(pr*.35)}" ry="${Math.floor(pr*.2)}" fill="${c2}" opacity=".6" transform="rotate(${a},${px2},${py2})"/>`;
    });
    // Center disk
    out+=`<circle cx="${fc}" cy="${fy}" r="${Math.floor(pr*.55)}" fill="#FFDD44"/>`;
    out+=`<circle cx="${fc}" cy="${fy}" r="${Math.floor(pr*.3)}" fill="#CC8800"/>`;
    // Center dots (pollen)
    [-2,0,2].forEach(dx=>[-2,0,2].forEach(dy=>{
      if(Math.abs(dx)+Math.abs(dy)<4)out+=`<rect x="${fc+dx-1}" y="${fy+dy-1}" width="1" height="1" fill="#FFEE88" opacity=".8"/>`;
    }));
    // Divine shimmer
    if(p.r==="divine"){
      out+=`<circle cx="${fc}" cy="${fy}" r="${Math.floor(pr*1.4)}" fill="none" stroke="${c}" stroke-width="1.5" opacity=".4"/>`;
      out+=`<circle cx="${fc}" cy="${fy}" r="${Math.floor(pr*1.7)}" fill="none" stroke="${c}" stroke-width="1" opacity=".2"/>`;
    }
  } else if(g>.3){
    // Bud stage
    const bx=cx,by=stemY+2,br=Math.floor(s*.1);
    out+=`<ellipse cx="${bx}" cy="${by+br}" rx="${br}" ry="${Math.floor(br*1.3)}" fill="${cdark}"/>`;
    out+=`<ellipse cx="${bx}" cy="${by+br}" rx="${Math.floor(br*.7)}" ry="${Math.floor(br*1.0)}" fill="${c}"/>`;
    out+=`<ellipse cx="${bx-Math.floor(br*.3)}" cy="${by+br}" rx="${Math.floor(br*.25)}" ry="${Math.floor(br*.7)}" fill="${c2}" opacity=".5"/>`;
    // Sepals
    out+=`<ellipse cx="${bx-Math.floor(br*.6)}" cy="${by+Math.floor(br*1.8)}" rx="${Math.floor(br*.5)}" ry="${Math.floor(br*.3)}" fill="#2d6e24" transform="rotate(-40,${bx-Math.floor(br*.6)},${by+Math.floor(br*1.8)})"/>`;
    out+=`<ellipse cx="${bx+Math.floor(br*.6)}" cy="${by+Math.floor(br*1.8)}" rx="${Math.floor(br*.5)}" ry="${Math.floor(br*.3)}" fill="#2d6e24" transform="rotate(40,${bx+Math.floor(br*.6)},${by+Math.floor(br*1.8)})"/>`;
  }
  out+=`</svg>`;return out;
}

function lightenColor(hex,amount){
  const r=Math.min(255,parseInt(hex.slice(1,3),16)+amount),g2=Math.min(255,parseInt(hex.slice(3,5),16)+amount),b=Math.min(255,parseInt(hex.slice(5,7),16)+amount);
  return`#${r.toString(16).padStart(2,"0")}${g2.toString(16).padStart(2,"0")}${b.toString(16).padStart(2,"0")}`;
}
function darkenColor(hex,amount){
  const r=Math.max(0,parseInt(hex.slice(1,3),16)-amount),g2=Math.max(0,parseInt(hex.slice(3,5),16)-amount),b=Math.max(0,parseInt(hex.slice(5,7),16)-amount);
  return`#${r.toString(16).padStart(2,"0")}${g2.toString(16).padStart(2,"0")}${b.toString(16).padStart(2,"0")}`;
}

function svgTree(p,size,g){
  g=Math.min(1,Math.max(0.02,g||0.02));
  const s=size,c=p.px||"#44BB44",cdark=darkenColor(c,35),clight=lightenColor(c,35);
  const cx=Math.floor(s/2);
  let out=`<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block">`;
  if(g<=.06){
    // Seed in soil
    out+=`<rect x="${cx-6}" y="${s-6}" width="12" height="6" rx="3" fill="#6B4226"/>`;
    out+=`<ellipse cx="${cx}" cy="${s-3}" rx="4" ry="3" fill="#8B6014" opacity=".7"/>`;
    out+=`</svg>`;return out;
  }
  const trunkW=Math.max(3,Math.floor(s*.1));
  const trunkH=Math.floor(s*g*.42);
  const trunkY=s-trunkH;
  // Trunk with bark texture
  out+=`<rect x="${cx-Math.floor(trunkW/2)}" y="${trunkY}" width="${trunkW}" height="${trunkH}" fill="#6B4226" rx="2"/>`;
  out+=`<rect x="${cx-Math.floor(trunkW/2)+1}" y="${trunkY+2}" width="1" height="${Math.floor(trunkH*.7)}" fill="#8B5a36" opacity=".6"/>`;
  // Bark lines (pixel art detail)
  if(trunkH>10){
    [.3,.6].forEach(yf=>{
      out+=`<rect x="${cx-Math.floor(trunkW/2)}" y="${trunkY+Math.floor(trunkH*yf)}" width="${trunkW}" height="1" fill="#4a2a16" opacity=".5"/>`;
    });
  }
  if(g>.18){
    const cr=Math.floor(s*g*.34);
    const canopyY=trunkY-Math.floor(cr*.8);
    // Shadow/depth layer
    out+=`<circle cx="${cx+2}" cy="${canopyY+3}" r="${cr}" fill="${cdark}" opacity=".5"/>`;
    // Main canopy
    out+=`<circle cx="${cx}" cy="${canopyY}" r="${cr}" fill="${c}"/>`;
    if(g>.4){
      // Secondary clusters for fullness
      out+=`<circle cx="${cx-Math.floor(cr*.5)}" cy="${canopyY+Math.floor(cr*.3)}" r="${Math.floor(cr*.65)}" fill="${cdark}" opacity=".75"/>`;
      out+=`<circle cx="${cx+Math.floor(cr*.5)}" cy="${canopyY+Math.floor(cr*.3)}" r="${Math.floor(cr*.65)}" fill="${c}" opacity=".85"/>`;
    }
    if(g>.6){
      out+=`<circle cx="${cx}" cy="${canopyY-Math.floor(cr*.35)}" r="${Math.floor(cr*.55)}" fill="${clight}" opacity=".7"/>`;
    }
    if(g>.8){
      // Extra side puffs
      out+=`<circle cx="${cx-Math.floor(cr*.7)}" cy="${canopyY+Math.floor(cr*.1)}" r="${Math.floor(cr*.45)}" fill="${cdark}" opacity=".6"/>`;
      out+=`<circle cx="${cx+Math.floor(cr*.7)}" cy="${canopyY+Math.floor(cr*.1)}" r="${Math.floor(cr*.45)}" fill="${c}" opacity=".6"/>`;
    }
    // Highlight spot (light source top-left)
    out+=`<ellipse cx="${cx-Math.floor(cr*.25)}" cy="${canopyY-Math.floor(cr*.2)}" rx="${Math.floor(cr*.35)}" ry="${Math.floor(cr*.25)}" fill="${clight}" opacity=".45"/>`;
    // Fruits or special detail for mature
    if(g>=1&&c!=="#226622"&&c!=="#EEEECC"){
      const fruitColor=["#FF4444","#FFAA00","#FF8866","#FFDD00"][Math.floor(parseInt(p.id?.slice(-2)||"0",16)%4)];
      [[-cr*.3,cr*.15],[cr*.3,cr*.2],[0,cr*.35],[cr*.4,-cr*.1],[-cr*.4,0]].forEach(([dx,dy])=>{
        out+=`<circle cx="${cx+Math.floor(dx)}" cy="${canopyY+Math.floor(dy)}" r="2" fill="${fruitColor}" opacity=".9"/>`;
      });
    }
    // Divine ring
    if(p.r==="divine"){
      out+=`<circle cx="${cx}" cy="${canopyY}" r="${cr+4}" fill="none" stroke="${c}" stroke-width="2" opacity=".5"/>`;
      out+=`<circle cx="${cx}" cy="${canopyY}" r="${cr+8}" fill="none" stroke="${c}" stroke-width="1" opacity=".25"/>`;
    }
  } else {
    // Sapling stage — just a thin trunk with tiny leaves
    out+=`<ellipse cx="${cx-5}" cy="${trunkY+4}" rx="6" ry="4" fill="${c}" opacity=".8" transform="rotate(-20,${cx-5},${trunkY+4})"/>`;
    out+=`<ellipse cx="${cx+5}" cy="${trunkY+7}" rx="6" ry="4" fill="${cdark}" opacity=".7" transform="rotate(20,${cx+5},${trunkY+7})"/>`;
  }
  out+=`</svg>`;return out;
}

function showToast(msg, dur=2500){
  APP.toast=msg;
  render();
  setTimeout(()=>{ APP.toast=null; render(); }, dur);
}

let incomeTimer=null;
function startIncome(){
  clearInterval(incomeTimer);
  incomeTimer=setInterval(()=>{
    const g=getGarden(); if(!g) return;
    const d=relDays(g);
    // 1-3 coins per minute depending on relationship age — slower economy
    const earn=Math.max(1,Math.floor(Math.sqrt(d)*0.4));
    g.money+=earn;
    saveGarden(g);
    render();
  },60000); // every minute instead of 30s
}

function render(){
  const el=document.getElementById("app");
  APP.now = new Date();

  const g=getGarden();
  if(g){
    const td=new Date().toDateString();
    if(g.shopDate!==td){g.shopItems=makeShopItems(td);g.shopDate=td;saveGarden(g);}
    if(g.wxDate!==td){g.wx=WEATHER[Math.floor(Math.random()*WEATHER.length)].id;g.wxDate=td;saveGarden(g);}
    getTodayEvents(g);
    checkSpecialEvent(g);
    saveGarden(g);
  }

  let html="";

  if(APP.screen==="inventory"){
    html=renderInventory();
  } else if(APP.screen==="splash"){
    html=renderSplash();
  } else if(APP.screen==="login"){
    html=renderLogin();
  } else if(APP.screen==="register"){
    html=renderRegister();
  } else if(APP.screen==="coupleSetup"){
    html=renderCoupleSetup();
  } else if(APP.screen==="main"){
    html=renderMain(g);
  }

  if(APP.toast){
    html+=`<div style="position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(20,50,20,.95);border:1px solid #3a6a3a;color:#9edd9e;padding:10px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:9999;white-space:nowrap;animation:fadeUp .3s ease">${APP.toast}</div>`;
  }

  el.innerHTML=html;
}

function renderInventory(){
  const g=getGarden();
  const inv=(g?.inventory||[]);
  const chests=inv.filter(x=>x.type==="chest");
  const seeds=inv.filter(x=>x.type==="seed");
  const boosts=inv.filter(x=>x.type==="boost");

  function chestCard(item,idx){
    const chest=CHESTS[item.chestRarity]||CHESTS.common;
    const rar=RARITIES[item.chestRarity]||RARITIES.common;
    return`<div style="display:flex;align-items:center;gap:12px;padding:12px;background:${rar.bg};border:1.5px solid ${chest.color}55;border-radius:12px;margin-bottom:8px">
      <div style="flex-shrink:0">${svgChest(item.chestRarity)}</div>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:900;color:${chest.color}">${chest.label}</div>
        <div style="font-size:9px;color:#446;margin-top:2px">${new Date(item.obtainedAt).toLocaleDateString("fr-FR")}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button onclick="APP.pendingModal={type:'openChest',chestRarity:'${item.chestRarity}',invIdx:${idx}};render()" style="background:${chest.color}22;border:1px solid ${chest.color}55;color:${chest.color};padding:6px 12px;border-radius:8px;font-size:10px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif">OUVRIR</button>
        <button onclick="offerChestTrade(${idx})" style="background:rgba(255,255,255,.05);border:1px solid #334;color:#668;padding:6px 10px;border-radius:8px;font-size:10px;cursor:pointer;font-family:'Nunito',sans-serif">ECHANGE</button>
      </div>
    </div>`;
  }

  function seedCard(item,idx){
    const plant=CATALOG.find(x=>x.id===item.plantId);
    if(!plant) return "";
    const rar=RARITIES[plant.r]||RARITIES.common;
    return`<div style="display:flex;align-items:center;gap:12px;padding:12px;background:${rar.bg};border:1.5px solid ${rar.color}55;border-radius:12px;margin-bottom:8px">
      <div style="flex-shrink:0">${svgPlant(plant.px,1.2)}</div>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:900;color:${rar.color}">${plant.name}</div>
        <div style="font-size:9px;color:#668;margin-top:2px">${rar.label} · ${plant.days}j de croissance</div>
      </div>
      <button onclick="plantFromInventory(${idx})" style="background:${rar.color}22;border:1px solid ${rar.color}55;color:${rar.color};padding:6px 12px;border-radius:8px;font-size:10px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif">PLANTER</button>
    </div>`;
  }

  return`<div style="min-height:100vh;background:#0a0f07;padding:16px 12px 90px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
      <button onclick="APP.screen='main';render()" style="background:none;border:none;color:#668;font-size:20px;cursor:pointer">←</button>
      <div style="font-size:16px;font-weight:900;color:#eee;font-family:'Press Start 2P',monospace;font-size:13px">INVENTAIRE</div>
    </div>
    ${chests.length?`
    <div style="font-size:10px;font-weight:800;color:#668;letter-spacing:2px;margin-bottom:10px">COFFRES (${chests.length})</div>
    ${chests.map((c,i)=>chestCard(c,inv.indexOf(c))).join("")}`:`<div style="padding:20px;text-align:center;color:#334;font-size:11px">Aucun coffre — complète des événements !</div>`}
    ${seeds.length?`
    <div style="font-size:10px;font-weight:800;color:#668;letter-spacing:2px;margin:14px 0 10px">GRAINES (${seeds.length})</div>
    ${seeds.map((s,i)=>seedCard(s,inv.indexOf(s))).join("")}`:""}
    ${boosts.length?`
    <div style="font-size:10px;font-weight:800;color:#668;letter-spacing:2px;margin:14px 0 10px">BOOSTS (${boosts.length})</div>
    ${boosts.map((b,i)=>`<div style="padding:12px;background:rgba(68,255,170,.05);border:1.5px solid #44ffaa55;border-radius:12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
      <div><div style="font-size:12px;font-weight:900;color:#44ffaa">BOOST x2 — ${b.hours}h</div><div style="font-size:9px;color:#446;margin-top:2px">Toutes les plantes poussent 2x plus vite</div></div>
      <button onclick="useBoost(${inv.indexOf(b)})" style="background:#44ffaa22;border:1px solid #44ffaa55;color:#44ffaa;padding:6px 12px;border-radius:8px;font-size:10px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif">UTILISER</button>
    </div>`).join("")}`:""}
  </div>`;
}

window.plantFromInventory=function(invIdx){
  const g=getGarden();if(!g)return;
  const item=g.inventory[invIdx];
  if(!item||item.type!=="seed")return;
  const plant=CATALOG.find(x=>x.id===item.plantId);
  if(!plant){showToast("Plante introuvable");return;}
  const emptyIdx=g.plots.findIndex((p,i)=>!p.plant&&i<g.gardenSize);
  if(emptyIdx===-1){showToast("Jardin plein !");return;}
  g.plots[emptyIdx]={...g.plots[emptyIdx],plant:plant.id,plantedAt:new Date().toISOString(),photo:null};
  g.inventory.splice(invIdx,1);
  g.notifications.push({id:Date.now(),text:`"${plant.name}" planté depuis l'inventaire !`,read:false});
  saveGarden(g);
  showToast(`${plant.name} planté !`);
  APP.screen="main";
  render();
};

window.useBoost=function(invIdx){
  const g=getGarden();if(!g)return;
  const item=g.inventory[invIdx];
  if(!item||item.type!=="boost")return;
  g.boostUntil=new Date(Date.now()+item.hours*3600000).toISOString();
  g.inventory.splice(invIdx,1);
  saveGarden(g);
  showToast("Boost activé ! Toutes vos plantes poussent 2x plus vite pendant "+item.hours+"h !");
  render();
};

window.offerChestTrade=function(invIdx){
  showToast("Echange bientôt disponible !");
};

async function doLogin(){
  const email=document.getElementById("loginEmail")?.value?.trim().toLowerCase();
  const pass=document.getElementById("loginPassword")?.value;
  if(!email||!pass){APP.authError="Remplis tous les champs";render();return;}
  APP.authError="Connexion...";render();
  _dbCache=null; // force refresh from server
  await dbFetch();
  const users=DB.getUsers();
  const uid=Object.keys(users).find(k=>users[k].email===email);
  if(!uid){APP.authError="Compte introuvable";render();return;}
  const u=users[uid];
  if(u.passwordHash!==DB.simHash(pass)){APP.authError="Mot de passe incorrect";render();return;}
  APP.currentUid=uid;
  APP.authError=null;
  DB.setSession({uid});
  if(u.gardenId){
    APP.gardenId=u.gardenId;
    APP.screen="main";
    startIncome();
  } else {
    APP.screen="coupleSetup";
  }
  render();
}

async function doRegister(){
  const pseudo=document.getElementById("regPseudo")?.value?.trim();
  const email=document.getElementById("regEmail")?.value?.trim().toLowerCase();
  const pass=document.getElementById("regPassword")?.value;
  const pass2=document.getElementById("regPassword2")?.value;
  if(!pseudo||!email||!pass||!pass2){APP.authError="Remplis tous les champs";render();return;}
  if(pass!==pass2){APP.authError="Les mots de passe ne correspondent pas";render();return;}
  if(pass.length<6){APP.authError="Mot de passe trop court (6 chars min)";render();return;}
  APP.authError="Création du compte...";render();
  _dbCache=null; // force refresh to check uniqueness
  await dbFetch();
  const users=DB.getUsers();
  if(Object.values(users).find(u=>u.email===email)){APP.authError="Email deja utilise";render();return;}
  if(Object.values(users).find(u=>u.pseudo===pseudo)){APP.authError="Pseudo deja pris";render();return;}
  const uid=DB.genId();
  const userData={uid,pseudo,email,passwordHash:DB.simHash(pass),joinedAt:new Date().toISOString(),gardenId:null,friendIds:[],biggestRelDays:0};
  DB.createUser(uid,userData);
  try {
    await dbSave();
    // Verify it saved
    const testR = await fetch(`${SB_URL}/rest/v1/nj_users?select=id&id=eq.${uid}`, {headers: SB_HDR});
    const testJ = await testR.json();
    if (!testR.ok || !testJ.length) {
      APP.authError = "Erreur sauvegarde: " + (testR.status) + " " + JSON.stringify(testJ).slice(0,100);
      render();
      return;
    }
  } catch(e) {
    APP.authError = "Erreur réseau: " + e.message;
    render();
    return;
  }
  APP.currentUid=uid;
  APP.authError=null;
  DB.setSession({uid});
  APP.screen="coupleSetup";
  render();
}

async function sendGardenInvite(){
  const pseudo=document.getElementById("partnerPseudo")?.value?.trim();
  const relStart=document.getElementById("relStartDate")?.value;
  if(!pseudo||!relStart){showToast("Remplis tous les champs");return;}
  showToast("Recherche en cours...");
  _dbCache=null;
  await dbFetch();
  const users=DB.getUsers();
  const searchLower=pseudo.toLowerCase();
  const partnerUid=Object.keys(users).find(k=>{
    const u=users[k];
    return u.pseudo?.toLowerCase()===searchLower
      || u.pseudo?.toLowerCase().includes(searchLower)
      || k===pseudo
      || k.slice(0,8)===pseudo;
  });
  if(!partnerUid||partnerUid===APP.currentUid){showToast("Introuvable — "+Object.keys(users).length+" comptes en base");return;}
  const partner=users[partnerUid];
  if(partner.gardenId){showToast("Ce partenaire a deja un jardin");return;}
  const invites=DB.getGardenInvites();
  if(invites.find(i=>i.fromUid===APP.currentUid&&i.toUid===partnerUid&&i.status==="pending")){showToast("Invitation deja envoyee");return;}
  const inv={id:DB.genId(),fromUid:APP.currentUid,toUid:partnerUid,relStart:new Date(relStart).toISOString(),status:"pending",sentAt:new Date().toISOString()};
  invites.push(inv);
  DB.saveGardenInvites(invites);
  await dbSave();
  showToast("Invitation envoyee a "+partner.pseudo+" !");
  coupleSetupMode="menu";
  render();
}

function copyMyId(){
  try{navigator.clipboard.writeText(APP.currentUid.slice(0,8));}catch(e){}
  showToast("ID copié !");
}

function acceptGardenInvite(invId){
  const invites=DB.getGardenInvites();
  const inv=invites.find(i=>i.id===invId);
  if(!inv)return;
  inv.status="accepted";
  DB.saveGardenInvites(invites);

  const gid=DB.genId();
  const relStart=inv.relStart;
  const d=Math.max(0,Math.floor((Date.now()-new Date(relStart).getTime())/864e5));
  const g=makeNewGarden(inv.fromUid,APP.currentUid,relStart);
  const bonus=Math.max(0,Math.floor(d/5)*d+d*10);
  g.money=bonus;
  DB.saveGarden(gid,g);

  DB.updateUser(inv.fromUid,{gardenId:gid});
  DB.updateUser(APP.currentUid,{gardenId:gid});
  APP.gardenId=gid;
  APP.screen="main";
  startIncome();
  showToast(`Jardin creé ! +${bonus} pieces pour ${d} jours ensemble !`);
  render();
}

function rejectGardenInvite(invId){
  const invites=DB.getGardenInvites();
  const inv=invites.find(i=>i.id===invId);
  if(inv)inv.status="rejected";
  DB.saveGardenInvites(invites);
  showToast("Invitation refusee");
  render();
}

function viewPublicGarden(gid){
  const g=DB.getGarden(gid);
  if(!g){showToast("Jardin introuvable");return;}
  const u1=DB.getUser(g.couple[0]);
  const u2=DB.getUser(g.couple[1]);
  const rd2=relDays(g);

  let plotsHtml="";
  for(let i=0;i<g.gardenSize;i++){
    const plot=g.plots[i];
    if(!plot.plant){
      plotsHtml+=`<div class="plot plot-empty" style="cursor:default"><div style="font-size:14px;opacity:.3">•</div></div>`;
      continue;
    }
    const plant=CATALOG.find(x=>x.id===plot.plant);
    const gr=growthOf(plot,g);
    const rar=plant?RARITIES[plant.r]:null;
    const plantSvg=plant?(plant.t==="flower"?svgFlower(plant,48,gr):svgTree(plant,48,gr)):"";
    plotsHtml+=`<div class="plot" style="border-color:${rar?.color||"#4a6a3a"}44;cursor:default">
<div style="animation:swayPlant 3s ease-in-out infinite">${plantSvg}</div>
<div style="position:absolute;bottom:2px;right:3px;font-family:'Press Start 2P',monospace;font-size:7px;color:${rar?.color||"#9edd9e"}">${Math.floor(gr*100)}%</div>
</div>`;
  }

  APP.pendingModal={type:"publicGarden",g,gid,u1,u2,rd:rd2,plotsHtml};
  render();
}

function openFriendGarden(uid){
  const u=DB.getUser(uid);
  if(u?.gardenId) viewPublicGarden(u.gardenId);
}

window.doDeleteGarden=async function(){
  const g=getGarden();
  if(!g)return;
  // Remove garden from DB
  const gardens=DB.getGardens();
  delete gardens[APP.gardenId];
  DB.saveGardens(gardens);
  // Remove gardenId from both users
  const uid1=g.couple[0];
  const uid2=g.couple[1];
  if(uid1) DB.updateUser(uid1,{gardenId:null});
  if(uid2) DB.updateUser(uid2,{gardenId:null});
  await dbSave();
  // Log out cleanly
  clearInterval(incomeTimer);
  APP={screen:"login",currentUid:APP.currentUid,gardenId:null,currentTab:"garden",pendingModal:null,selectedShopItem:null,toast:null,authError:null,calendarPermission:false,notifPermission:false,now:new Date()};
  APP.screen="main"; // stay logged in, just no garden
  showToast("Jardin supprimé. 💔");
  render();
};

  g.notifications.push({id:Date.now(),text:`${plant?.name||"Plante"} supprimée du jardin.`,read:false});

};

  g.money-=cost;

window.requestBuy=async function(itemId){
  const g=getGarden();if(!g)return;
  const plant=CATALOG.find(x=>x.id===itemId);
  if(!plant)return;
  if(g.money<plant.price){showToast("Pas assez de pièces");return;}
  // Save pending request to DB so partner sees it
  const req={id:DB.genId(),type:"buy",itemId,from:APP.currentUid,gardenId:APP.gardenId,status:"pending",sentAt:new Date().toISOString()};
  const reqs=DB.getRequests();
  // Remove any previous pending buy request
  const filtered=reqs.filter(r=>!(r.type==="buy"&&r.gardenId===APP.gardenId&&r.status==="pending"));
  filtered.push(req);
  DB.saveRequests(filtered);
  await dbSave();
  sendApprovalNotif(`${getMe()?.pseudo} veut acheter ${plant.name} pour le jardin !`);
  showToast("Demande envoyée à ton partenaire !");
  render();
};

window.approveModal=async function(){
  const m=APP.pendingModal;
  const g=getGarden();if(!g)return;
  if(m.type==="spend"){
    const plant=CATALOG.find(x=>x.id===m.itemId);
    if(!plant||g.money<plant.price){closeModal();return;}
    const emptyIdx=g.plots.findIndex((p,i)=>!p.plant&&i<g.gardenSize);
    if(emptyIdx===-1){showToast("Jardin plein ! Agrandissez d'abord.");closeModal();saveGarden(g);render();return;}
    g.money-=plant.price;
    g.plots[emptyIdx]={...g.plots[emptyIdx],plant:plant.id,plantedAt:new Date().toISOString(),photo:null};
    g.shopItems=g.shopItems.map(x=>x.id===plant.id?{...x,qty:x.qty-1}:x).filter(x=>x.qty>0);
    g.pendingReq=null;
    g.notifications.push({id:Date.now(),text:`"${plant.name}" planté dans le jardin !`,read:false});
    // Mark request as approved in DB
    const reqs=DB.getRequests().map(r=>r.id===m.reqId?{...r,status:"approved"}:r);
    DB.saveRequests(reqs);
    saveGarden(g);await dbSave();closeModal();render();
  }
};

window.handleEventPhoto=async function(e, doneKey, photoKey, photoDateKey){
  const file=e.target.files?.[0];if(!file)return;
  // Default to legacy keys
  doneKey=doneKey||"eventDone";
  photoKey=photoKey||"eventPhoto";
  photoDateKey=photoDateKey||"eventPhotoDate";
  const reader=new FileReader();
  reader.onload=async function(ev2){
    const dataUrl=ev2.target.result;
    const photoDate=formatDateShort(getCurrentDateTime());
    const g=getGarden();
    const evMap={dailyEventDone:g?.dailyEvent,weeklyEventDone:g?.weeklyEvent,monthlyEventDone:g?.monthlyEvent,specialEventDone:g?.specialEvent,eventDone:g?.event};
    const ev=evMap[doneKey]||g?.dailyEvent;
    APP.pendingModal={type:"verifying"};render();
    try{
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:200,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:dataUrl.split(",")[1]}},
            {type:"text",text:`Tu es Inspector Légume, vérificateur photo d'un jeu de jardin de couple. L'événement à vérifier est: "${ev?.name}" - "${ev?.desc}". Regarde la photo et dis si elle correspond à l'activité décrite. Réponds EXACTEMENT par: VALIDE si la photo montre bien l'activité (ou quelque chose de cohérent), ou INVALIDE si la photo ne correspond pas du tout. Puis ajoute 1 phrase marrante en character.`}
          ]}]
        })
      });
      const data=await resp.json();
      const txt=data.content?.[0]?.text||"";
      const ok=txt.includes("VALIDE")&&!txt.includes("INVALIDE");
      APP.pendingModal={type:"eventResult",ok,msg:txt.replace("VALIDE","").replace("INVALIDE","").trim(),photo:dataUrl,photoDate,doneKey,photoKey,photoDateKey,ev};
    }catch(err){
      const ok=Math.random()>.25;
      APP.pendingModal={type:"eventResult",ok,msg:ok?"Photo acceptée ! Bien joué !":"Hmm, cette photo ne correspond pas...",photo:dataUrl,photoDate,doneKey,photoKey,photoDateKey,ev};
    }
    render();
  };
  reader.readAsDataURL(file);
};

window.confirmEventResult=function(ok,photoEncoded){
  const g=getGarden();if(!g)return;
  if(ok){
    const photo=decodeURIComponent(photoEncoded);
    const photoDate=APP.pendingModal?.photoDate||formatDateShort(APP.now);
    const doneKey=APP.pendingModal?.doneKey||"eventDone";
    const photoKey=APP.pendingModal?.photoKey||"eventPhoto";
    const photoDateKey=APP.pendingModal?.photoDateKey||"eventPhotoDate";
    const ev=APP.pendingModal?.ev||g.event;
    g[doneKey]=true;
    g[photoKey]=photo;
    g[photoDateKey]=photoDate;
    if(!g.inventory) g.inventory=[];
    if(ev?.reward==="money") g.money+=ev.amount;
    if(ev?.reward==="chest"){
      const cr=ev.chestRarity||"uncommon";
      g.inventory.push({id:DB.genId(),type:"chest",chestRarity:cr,obtainedAt:new Date().toISOString()});
      showToast("Coffre "+( CHESTS[cr]?.label||cr)+" ajouté à votre inventaire !");
    }
    const plotIdx=g.plots.findIndex(p=>p.plant&&!p.photo);
    if(plotIdx>=0&&photo){g.plots[plotIdx]={...g.plots[plotIdx],photo,photoDate};}
    g.notifications.push({id:Date.now(),text:`Défi "${ev.name}" validé ! Récompense obtenue.`,read:false});
  }
  saveGarden(g);closeModal();render();
};

window.sendFriendRequest=function(){
  const val=document.getElementById("addFriendInput")?.value?.trim();
  if(!val){showToast("Entre un pseudo ou un ID");return;}
  const users=DB.getUsers();
  const targetUid=Object.keys(users).find(k=>users[k].pseudo===val||k.startsWith(val));
  if(!targetUid||targetUid===APP.currentUid){showToast("Utilisateur introuvable");return;}
  const reqs=DB.getRequests();
  if(reqs.find(r=>r.from===APP.currentUid&&r.to===targetUid&&r.status==="pending")){showToast("Demande déjà envoyée");return;}
  if((DB.getUser(APP.currentUid)?.friendIds||[]).includes(targetUid)){showToast("Déjà ami(e)");return;}
  reqs.push({id:DB.genId(),from:APP.currentUid,to:targetUid,status:"pending",sentAt:new Date().toISOString()});
  DB.saveRequests(reqs);
  sendApprovalNotif(`${getMe()?.pseudo} veut être ton ami sur Notre Jardin !`);
  showToast("Demande d'ami envoyée !");
  render();
};

window.acceptFriend=function(reqId){
  const reqs=DB.getRequests();
  const req=reqs.find(r=>r.id===reqId);
  if(!req)return;
  req.status="accepted";
  DB.saveRequests(reqs);

  const me=DB.getUser(APP.currentUid);
  const them=DB.getUser(req.from);
  DB.updateUser(APP.currentUid,{friendIds:[...(me?.friendIds||[]),req.from]});
  DB.updateUser(req.from,{friendIds:[...(them?.friendIds||[]),APP.currentUid]});
  showToast(`${them?.pseudo} ajouté(e) en ami(e) !`);
  render();
};

window.rejectFriend=function(reqId){
  const reqs=DB.getRequests();
  const req=reqs.find(r=>r.id===reqId);
  if(req)req.status="rejected";
  DB.saveRequests(reqs);
  render();
};

window.doLogout=function(){

  const g=getGarden();
  if(g){
    const rd=relDays(g);
    const me=DB.getUser(APP.currentUid);
    if(rd>=(me?.biggestRelDays||0)){
      DB.updateUser(APP.currentUid,{biggestRelDays:rd});
    }
  }
  DB.clearSession();
  clearInterval(incomeTimer);
  APP={screen:"login",currentUid:null,gardenId:null,currentTab:"garden",pendingModal:null,selectedShopItem:null,toast:null,authError:null,calendarPermission:false,notifPermission:false,now:new Date()};
  coupleSetupMode="menu";
  render();
};

function svgChest(rarity){

  return `<svg width="48" height="40" viewBox="0 0 48 40" fill="none" style="${glow}">

    <rect x="4" y="17" width="40" height="22" rx="3" fill="#2a1a0a"/>

    <!-- Corner bolts -->
    <circle cx="9" cy="20" r="2" fill="${c}88" stroke="${c}" stroke-width=".5"/>
    <circle cx="39" cy="20" r="2" fill="${c}88" stroke="${c}" stroke-width=".5"/>
    <circle cx="9" cy="35" r="2" fill="${c}88" stroke="${c}" stroke-width=".5"/>
    <circle cx="39" cy="35" r="2" fill="${c}88" stroke="${c}" stroke-width=".5"/>
    <!-- Lid -->
    <rect x="4" y="8" width="40" height="11" rx="3" fill="#1a0f06"/>
    <rect x="4" y="8" width="40" height="11" rx="3" stroke="${c}" stroke-width="1.5" fill="${c}33"/>
    <!-- Lid curve highlight -->
    <ellipse cx="24" cy="10" rx="16" ry="4" fill="${c}22"/>
    <!-- Lid-body seam -->
    <line x1="4" y1="17" x2="44" y2="17" stroke="${c}" stroke-width="1"/>

window.doOpenChest = function(chestRarity, invIdx) {
  const g = getGarden(); if(!g) return;
  const result = openChest(chestRarity);
  // Apply result to garden
  if(result.type==="money"){
    g.money += result.amount;
  } else if(result.type==="seed"){
    // Add seed to inventory as a plantable item
    if(!g.inventory) g.inventory=[];
    g.inventory.push({id:DB.genId(), type:"seed", plantId:result.plant.id, rarity:result.rarity, obtainedAt:new Date().toISOString()});
  } else if(result.type==="boost"){
    if(!g.inventory) g.inventory=[];
    g.inventory.push({id:DB.genId(), type:"boost", hours:result.hours, obtainedAt:new Date().toISOString()});
  }
  // Remove chest from inventory
  if(invIdx!==undefined && invIdx!=="" && g.inventory){
    g.inventory=g.inventory.filter((_,i)=>i!==parseInt(invIdx));
  }
  saveGarden(g);
  APP.pendingModal={type:"openChest",chestRarity,result};
  render();
};

window.addChestToInventory = function(chestRarity){
  const g=getGarden();if(!g)return;
  if(!g.inventory)g.inventory=[];
  g.inventory.push({id:DB.genId(),type:"chest",chestRarity,obtainedAt:new Date().toISOString()});
  saveGarden(g);
  showToast("Coffre ajouté à l'inventaire !");
  render();
};

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("/sw.js").then(reg=>{
      // Dès qu'un nouveau SW est trouvé, il s'installe et prend le contrôle
      reg.addEventListener("updatefound",()=>{
        const newWorker=reg.installing;
        newWorker.addEventListener("statechange",()=>{
          // Nouveau SW installé et en attente -> on force le rechargement
          if(newWorker.state==="installed"&&navigator.serviceWorker.controller){
            // Envoyer message au SW pour qu'il prenne contrôle immédiatement
            newWorker.postMessage({type:"SKIP_WAITING"});
          }
        });
      });
      // Quand le SW change de contrôleur -> recharger la page pour avoir la dernière version
      navigator.serviceWorker.addEventListener("controllerchange",()=>{
        window.location.reload();
      });
    }).catch(e=>console.log("SW err",e));
    // Vérifier les mises à jour toutes les 60 secondes
    setInterval(()=>{
      navigator.serviceWorker.getRegistration().then(reg=>{if(reg)reg.update();});
    },60000);
  });
}
